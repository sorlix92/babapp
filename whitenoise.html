<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabApp - Altatás és Fehér Zaj</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Quicksand:wght@400;600;700&display=swap');

        :root {
            --paper-bg: #fffdf5;
            --text-color: #5d5d5d;
            --main-accent: #cdb4db; /* Nyugtató levendula az alváshoz */
            --main-accent-shadow: #9a82a8;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: #f7f3e8; 
            color: var(--text-color);
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 20px 20px;
            transition: background-color 0.5s, color 0.5s, background-image 0.5s;
        }

        .handwritten { font-family: 'Patrick Hand', cursive; }

        .paper-card {
            background: var(--paper-bg);
            box-shadow: 2px 4px 12px rgba(0,0,0,0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, background-color 0.5s, box-shadow 0.5s;
        }
        
        .btn-primary {
            background-color: var(--main-accent);
            color: white;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            border-radius: 12px;
            box-shadow: 0 4px 0 var(--main-accent-shadow);
            transition: all 0.1s;
        }
        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 var(--main-accent-shadow);
        }

        /* Aktív kijelölt zajkártya stílusa (a Hozzátáplálás csekklistájához igazítva) */
        .sound-active-card {
            border-color: #cdb4db !important;
            background-color: #fbf8ff !important;
            box-shadow: inset 0 0 8px rgba(205, 180, 219, 0.15), 2px 4px 12px rgba(205, 180, 219, 0.1) !important;
        }

        /* Meleg tónusú Éjszakai Mód (szépia-éjszakai füzetlap) */
        .night-theme {
            background-color: #1a1815 !important;
            color: #c9bfb3 !important;
            background-image: radial-gradient(#2d2922 1px, transparent 1px) !important;
        }
        .night-theme .paper-card {
            background: #23211c !important;
            box-shadow: 2px 4px 16px rgba(0,0,0,0.3) !important;
            border-color: #33302a !important;
        }
        .night-theme .text-gray-700,
        .night-theme .text-slate-800,
        .night-theme .text-gray-800 {
            color: #d8cebf !important;
        }
        .night-theme .text-gray-400 {
            color: #7d7568 !important;
        }
        .night-theme .bg-gray-50,
        .night-theme .bg-slate-50,
        .night-theme .bg-[#fffdfa] {
            background-color: #2b2823 !important;
        }
        .night-theme .sound-active-card {
            border-color: #8a7596 !important;
            background-color: #2c2530 !important;
        }

        /* Pulzáló Glow effekt lejátszáskor */
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.35; filter: blur(16px); }
            50% { transform: scale(1.18); opacity: 0.65; filter: blur(24px); }
        }
        .pulsing-glow {
            animation: pulse-glow 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    
    <div id="root"></div>

    <script type="text/babel">

        // Szuper tiszta és barátságos egyedi kézzel rajzolt hatású vektoros ikonok
        const Icons = {
            Back: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
            ),
            Moon: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                </svg>
            ),
            Sun: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                </svg>
            ),
            Refresh: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
                </svg>
            ),
            Utensils: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
                </svg>
            ),
            Baby: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.5 1.5.5 2 0"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/>
                </svg>
            ),
            Home: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            ),
            Timer: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
            ),

            // --- ZAJIKONOK KÉZZEL RAZOLT STÍLUSBAN ---
            white: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                    <path d="M17 2l-5 5-5-5"/>
                    <path d="M16 14h.01M8 14h.01M12 14h.01"/>
                </svg>
            ),
            pink: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/>
                    <path d="M12 2a4 4 0 0 0-4 4v1a4 4 0 0 0 8 0V6a4 4 0 0 0-4-4z"/>
                    <path d="M12 22a4 4 0 0 0 4-4v-1a4 4 0 0 0-8 0v1a4 4 0 0 0 4 4z"/>
                    <path d="M2 12a4 4 0 0 0 4 4h1a4 4 0 0 0 0-8H6a4 4 0 0 0-4 4z"/>
                    <path d="M22 12a4 4 0 0 0-4-4h-1a4 4 0 0 0 0 8h1a4 4 0 0 0 4-4z"/>
                </svg>
            ),
            brown: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M2 6c1.5 1 2.5-1 4-1s2.5 2 4 1 2.5-2 4-1 2.5 2 4 1 2.5-2 4-1"/>
                    <path d="M2 12c1.5 1 2.5-1 4-1s2.5 2 4 1 2.5-2 4-1 2.5 2 4 1 2.5-2 4-1"/>
                    <path d="M2 18c1.5 1 2.5-1 4-1s2.5 2 4 1 2.5-2 4-1 2.5 2 4 1 2.5-2 4-1"/>
                </svg>
            ),
            heartbeat: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
            ),
            rain: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/>
                    <path d="M8 16l-2 4M12 16l-2 4M16 16l-2 4"/>
                </svg>
            ),
            dryer: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
                </svg>
            ),
            vacuum: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 20h18M6 20v-4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4M12 14V4M8 4h8"/>
                </svg>
            ),
            lullaby: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M9 18V5l12-2v13"/>
                    <circle cx="6" cy="18" r="3"/>
                    <circle cx="18" cy="16" r="3"/>
                </svg>
            ),
            defaultMoon: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                </svg>
            )
        };

        const App = () => {
            const [activeTab, setActiveTab] = React.useState('sounds'); // 'sounds' vagy 'tips'
            const [isNightMode, setIsNightMode] = React.useState(false);
            const [isPlaying, setIsPlaying] = React.useState(false);
            const [activeSound, setActiveSound] = React.useState(null);
            const [activeSoundLabel, setActiveSoundLabel] = React.useState('Válassz egy zajt');
            const [timerPreset, setTimerPreset] = React.useState(0); // percben (0 = végtelen)
            const [timeRemaining, setTimeRemaining] = React.useState(0); // másodpercben
            const [isTimerOpen, setIsTimerOpen] = React.useState(false); // összecsukható időzítő állapota

            const volume = 0.7; // fix hangerő a telefon gombjaihoz igazítva

            // Web Audio API useRef-ek a hálózati függetlenséghez és folyamatos működéshez
            const audioCtxRef = React.useRef(null);
            const gainNodeRef = React.useRef(null);
            const noiseNodeRef = React.useRef(null);
            const filterNodeRef = React.useRef(null);
            
            // Interval és Timeout regisztrációk
            const heartbeatIntervalRef = React.useRef(null);
            const lullabyIntervalRef = React.useRef(null);
            const rainIntervalRef = React.useRef(null);
            const timerIntervalRef = React.useRef(null);
            
            const noteIdxRef = React.useRef(0);
            const fadeOutDuration = 15; // elhalkulási idő (másodperc)

            // Brahms altatódal kottája
            const lullabyNotes = [
                {note: 329.63, dur: 0.5}, {note: 329.63, dur: 0.5}, {note: 392.00, dur: 1.0},
                {note: 329.63, dur: 0.5}, {note: 329.63, dur: 0.5}, {note: 392.00, dur: 1.0},
                {note: 329.63, dur: 0.5}, {note: 392.00, dur: 0.5}, {note: 523.25, dur: 1.0},
                {note: 493.88, dur: 0.5}, {note: 440.00, dur: 0.5}, {note: 440.00, dur: 0.5}, {note: 392.00, dur: 1.0},
                {note: 293.66, dur: 0.5}, {note: 329.63, dur: 0.5}, {note: 349.23, dur: 1.0},
                {note: 293.66, dur: 0.5}, {note: 329.63, dur: 0.5}, {note: 349.23, dur: 1.0},
                {note: 293.66, dur: 0.5}, {note: 349.23, dur: 0.5}, {note: 493.88, dur: 1.0},
                {note: 440.00, dur: 0.5}, {note: 392.00, dur: 0.5}, {note: 493.88, dur: 0.5}, {note: 523.25, dur: 1.5},
                {note: 0, dur: 1.0}
            ];

            // Éjszakai mód hatása a body-ra
            React.useEffect(() => {
                if (isNightMode) {
                    document.body.classList.add('night-theme');
                } else {
                    document.body.classList.remove('night-theme');
                }
            }, [isNightMode]);

            // AudioContext és Gain inicializálása
            const initAudio = () => {
                if (!audioCtxRef.current) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtxRef.current = new AudioContext();
                    
                    gainNodeRef.current = audioCtxRef.current.createGain();
                    gainNodeRef.current.connect(audioCtxRef.current.destination);
                    gainNodeRef.current.gain.setValueAtTime(volume, audioCtxRef.current.currentTime);
                }
                if (audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }
            };

            // Minden aktív audio generátor leállítása
            const stopAllSounds = () => {
                if (noiseNodeRef.current) {
                    try { noiseNodeRef.current.stop(); } catch(e){}
                    noiseNodeRef.current = null;
                }
                if (heartbeatIntervalRef.current) {
                    clearInterval(heartbeatIntervalRef.current);
                    heartbeatIntervalRef.current = null;
                }
                if (lullabyIntervalRef.current) {
                    clearTimeout(lullabyIntervalRef.current);
                    lullabyIntervalRef.current = null;
                }
                if (rainIntervalRef.current) {
                    clearInterval(rainIntervalRef.current);
                    rainIntervalRef.current = null;
                }
            };

            // --- ZAJ GENERÁTOROK ---
            const createWhiteNoise = () => {
                const bufferSize = 2 * audioCtxRef.current.sampleRate;
                const noiseBuffer = audioCtxRef.current.createBuffer(1, bufferSize, audioCtxRef.current.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                const source = audioCtxRef.current.createBufferSource();
                source.buffer = noiseBuffer;
                source.loop = true;
                return source;
            };

            const createPinkNoise = () => {
                const bufferSize = 2 * audioCtxRef.current.sampleRate;
                const noiseBuffer = audioCtxRef.current.createBuffer(1, bufferSize, audioCtxRef.current.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856;
                    b4 = 0.55000 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.0168980;
                    output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                    output[i] *= 0.11;
                    b6 = white * 0.115926;
                }
                const source = audioCtxRef.current.createBufferSource();
                source.buffer = noiseBuffer;
                source.loop = true;
                return source;
            };

            const createBrownNoise = () => {
                const bufferSize = 2 * audioCtxRef.current.sampleRate;
                const noiseBuffer = audioCtxRef.current.createBuffer(1, bufferSize, audioCtxRef.current.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                let lastOut = 0.0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    output[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = output[i];
                    output[i] *= 3.5;
                }
                const source = audioCtxRef.current.createBufferSource();
                source.buffer = noiseBuffer;
                source.loop = true;
                return source;
            };

            // --- SZINTETIZÁLT KOMPLEX HANGOK ---
            const startHeartbeat = () => {
                noiseNodeRef.current = createBrownNoise();
                filterNodeRef.current = audioCtxRef.current.createBiquadFilter();
                filterNodeRef.current.type = 'lowpass';
                filterNodeRef.current.frequency.setValueAtTime(120, audioCtxRef.current.currentTime);
                
                noiseNodeRef.current.connect(filterNodeRef.current);
                filterNodeRef.current.connect(gainNodeRef.current);
                noiseNodeRef.current.start(0);

                const tempo = 920; 
                const playThump = (freq, duration, vol) => {
                    if (!audioCtxRef.current || !isPlaying) return;
                    const osc = audioCtxRef.current.createOscillator();
                    const thumpGain = audioCtxRef.current.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtxRef.current.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(10, audioCtxRef.current.currentTime + duration);
                    
                    thumpGain.gain.setValueAtTime(0.001, audioCtxRef.current.currentTime);
                    thumpGain.gain.linearRampToValueAtTime(vol, audioCtxRef.current.currentTime + 0.02);
                    thumpGain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + duration);
                    
                    osc.connect(thumpGain);
                    thumpGain.connect(gainNodeRef.current);
                    
                    osc.start();
                    osc.stop(audioCtxRef.current.currentTime + duration);
                };

                const pulse = () => {
                    playThump(75, 0.15, 0.9);
                    setTimeout(() => {
                        playThump(68, 0.15, 0.7);
                    }, 250);
                };

                pulse();
                heartbeatIntervalRef.current = setInterval(pulse, tempo);
            };

            const startRain = () => {
                noiseNodeRef.current = createPinkNoise();
                filterNodeRef.current = audioCtxRef.current.createBiquadFilter();
                filterNodeRef.current.type = 'lowpass';
                filterNodeRef.current.frequency.setValueAtTime(800, audioCtxRef.current.currentTime);
                
                noiseNodeRef.current.connect(filterNodeRef.current);
                filterNodeRef.current.connect(gainNodeRef.current);
                noiseNodeRef.current.start(0);

                rainIntervalRef.current = setInterval(() => {
                    if (!audioCtxRef.current || !isPlaying) return;
                    if (Math.random() > 0.4) {
                        const osc = audioCtxRef.current.createOscillator();
                        const clickGain = audioCtxRef.current.createGain();
                        
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(1800 + Math.random() * 2000, audioCtxRef.current.currentTime);
                        
                        clickGain.gain.setValueAtTime(0.001, audioCtxRef.current.currentTime);
                        clickGain.gain.linearRampToValueAtTime(0.02 + Math.random() * 0.03, audioCtxRef.current.currentTime + 0.002);
                        clickGain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + 0.05 + Math.random() * 0.05);
                        
                        osc.connect(clickGain);
                        clickGain.connect(gainNodeRef.current);
                        osc.start();
                        osc.stop(audioCtxRef.current.currentTime + 0.12);
                    }
                }, 60);
            };

            const startHairdryer = () => {
                noiseNodeRef.current = createPinkNoise();
                filterNodeRef.current = audioCtxRef.current.createBiquadFilter();
                filterNodeRef.current.type = 'bandpass';
                filterNodeRef.current.frequency.setValueAtTime(450, audioCtxRef.current.currentTime);
                filterNodeRef.current.Q.setValueAtTime(1.5, audioCtxRef.current.currentTime);
                
                noiseNodeRef.current.connect(filterNodeRef.current);
                filterNodeRef.current.connect(gainNodeRef.current);
                noiseNodeRef.current.start(0);
            };

            const startVacuum = () => {
                noiseNodeRef.current = createBrownNoise();
                filterNodeRef.current = audioCtxRef.current.createBiquadFilter();
                filterNodeRef.current.type = 'lowpass';
                filterNodeRef.current.frequency.setValueAtTime(320, audioCtxRef.current.currentTime);
                
                const highpass = audioCtxRef.current.createBiquadFilter();
                highpass.type = 'peaking';
                highpass.frequency.setValueAtTime(150, audioCtxRef.current.currentTime);
                highpass.gain.setValueAtTime(10, audioCtxRef.current.currentTime);
                
                noiseNodeRef.current.connect(highpass);
                highpass.connect(filterNodeRef.current);
                filterNodeRef.current.connect(gainNodeRef.current);
                noiseNodeRef.current.start(0);
            };

            const playLullabyMelody = () => {
                if (!isPlaying || !audioCtxRef.current) return;
                
                const note = lullabyNotes[noteIdxRef.current];
                const nextNoteDelay = note.dur * 1000 * 1.4;

                if (note.note > 0) {
                    const osc1 = audioCtxRef.current.createOscillator();
                    const noteGain = audioCtxRef.current.createGain();
                    
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(note.note, audioCtxRef.current.currentTime);
                    
                    const osc2 = audioCtxRef.current.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(note.note * 2, audioCtxRef.current.currentTime);
                    
                    noteGain.gain.setValueAtTime(0, audioCtxRef.current.currentTime);
                    noteGain.gain.linearRampToValueAtTime(0.12, audioCtxRef.current.currentTime + 0.04);
                    noteGain.gain.exponentialRampToValueAtTime(0.001, audioCtxRef.current.currentTime + (note.dur * 1.6));
                    
                    osc1.connect(noteGain);
                    osc2.connect(noteGain);
                    noteGain.connect(gainNodeRef.current);
                    
                    osc1.start();
                    osc2.start();
                    osc1.stop(audioCtxRef.current.currentTime + (note.dur * 1.6));
                    osc2.stop(audioCtxRef.current.currentTime + (note.dur * 1.6));
                }

                noteIdxRef.current = (noteIdxRef.current + 1) % lullabyNotes.length;
                lullabyIntervalRef.current = setTimeout(playLullabyMelody, nextNoteDelay);
            };

            // Hang elindítása típus szerint
            const playSoundEngine = (type) => {
                stopAllSounds();
                if (!isPlaying) return;

                switch(type) {
                    case 'white':
                        noiseNodeRef.current = createWhiteNoise();
                        noiseNodeRef.current.connect(gainNodeRef.current);
                        noiseNodeRef.current.start(0);
                        break;
                    case 'pink':
                        noiseNodeRef.current = createPinkNoise();
                        noiseNodeRef.current.connect(gainNodeRef.current);
                        noiseNodeRef.current.start(0);
                        break;
                    case 'brown':
                        noiseNodeRef.current = createBrownNoise();
                        noiseNodeRef.current.connect(gainNodeRef.current);
                        noiseNodeRef.current.start(0);
                        break;
                    case 'heartbeat':
                        startHeartbeat();
                        break;
                    case 'rain':
                        startRain();
                        break;
                    case 'dryer':
                        startHairdryer();
                        break;
                    case 'vacuum':
                        startVacuum();
                        break;
                    case 'lullaby':
                        noteIdxRef.current = 0;
                        playLullabyMelody();
                        break;
                    default:
                        break;
                }
            };

            // Fő gomb váltó (Play/Pause)
            const togglePlay = () => {
                initAudio();
                
                // Ha nincs még hang kiválasztva, indítsa el a Fehér Zajjal alapértelmezetten
                if (!activeSound) {
                    selectSound('white', 'Fehér Zaj');
                    return;
                }

                const nextPlaying = !isPlaying;
                setIsPlaying(nextPlaying);

                if (!nextPlaying) {
                    stopAllSounds();
                    stopTimerInterval();
                }
            };

            // Effect a lejátszási állapot és az aktív hang szinkronizálására
            React.useEffect(() => {
                if (isPlaying && activeSound) {
                    playSoundEngine(activeSound);
                    if (timeRemaining > 0) {
                        startTimerInterval();
                    }
                } else {
                    stopAllSounds();
                }
            }, [isPlaying, activeSound]);

            // Kártyás hangválasztó és közvetlen Play/Pause kezelője
            const selectSound = (type, label) => {
                initAudio();

                // Ha pont ugyanarra a futó kártyára kattintunk -> leállítjuk
                if (activeSound === type && isPlaying) {
                    setIsPlaying(false);
                    stopAllSounds();
                    stopTimerInterval();
                    return;
                }

                // Új hang indítása, vagy meglévő újraindítása
                setActiveSound(type);
                setActiveSoundLabel(label);
                setIsPlaying(true);
            };

            // --- IDŐZÍTŐ LOGIKA ---
            const handleTimerSet = (minutes) => {
                setTimerPreset(minutes);
                if (minutes === 0) {
                    stopTimerInterval();
                    setTimeRemaining(0);
                    return;
                }
                const seconds = minutes * 60;
                setTimeRemaining(seconds);

                if (isPlaying) {
                    startTimerInterval();
                }
            };

            const startTimerInterval = () => {
                if (timerIntervalRef.current) clearInterval(timerIntervalRef.current);
                
                timerIntervalRef.current = setInterval(() => {
                    setTimeRemaining((prev) => {
                        if (prev <= 1) {
                            // Idő lejárt
                            setIsPlaying(false);
                            stopAllSounds();
                            stopTimerInterval();
                            setActiveSoundLabel('Időzítő lejárt');
                            
                            // Visszaállítjuk a halkítást alapértékre
                            if (gainNodeRef.current && audioCtxRef.current) {
                                gainNodeRef.current.gain.setValueAtTime(volume, audioCtxRef.current.currentTime);
                            }
                            return 0;
                        }

                        // Finom elhalkítás az utolsó 15 másodpercben
                        const nextSec = prev - 1;
                        if (nextSec <= fadeOutDuration && gainNodeRef.current && audioCtxRef.current) {
                            const ratio = nextSec / fadeOutDuration;
                            gainNodeRef.current.gain.setValueAtTime(volume * ratio, audioCtxRef.current.currentTime);
                        }

                        return nextSec;
                    });
                }, 1000);
            };

            const stopTimerInterval = () => {
                if (timerIntervalRef.current) {
                    clearInterval(timerIntervalRef.current);
                    timerIntervalRef.current = null;
                }
            };

            const formatTime = (totalSeconds) => {
                const mins = Math.floor(totalSeconds / 60);
                const secs = totalSeconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const soundsList = [
                { id: 'white', label: 'Fehér Zaj', color: 'bg-[#FFC8DD]' },
                { id: 'pink', label: 'Rózsaszín Zaj', color: 'bg-[#FAE1DD]' },
                { id: 'brown', label: 'Barna Zaj', color: 'bg-[#E6CCB2]' },
                { id: 'heartbeat', label: 'Szívverés', color: 'bg-[#FFD6D6]' },
                { id: 'rain', label: 'Nyári Eső', color: 'bg-[#BDE0FE]' },
                { id: 'dryer', label: 'Hajszárító', color: 'bg-[#FFD7BA]' },
                { id: 'vacuum', label: 'Porszívó', color: 'bg-[#D8F3DC]' },
                { id: 'lullaby', label: 'Brahms Dal', color: 'bg-[#CDB4DB]' }
            ];

            // Aktív ikon dinamikus lekérése a lejátszó gombhoz
            const ActiveSoundIcon = activeSound && Icons[activeSound] ? Icons[activeSound] : Icons.defaultMoon;

            return (
                <div className="min-h-screen pb-24 max-w-3xl mx-auto flex flex-col justify-between">
                    
                    {/* FEJLÉC */}
                    <div className="bg-white rounded-b-[2rem] shadow-sm mb-6 overflow-hidden border-b-4 border-[#CDB4DB] border-dashed">
                        
                        {/* ALSÓ-FELSŐ NAVIGÁCIÓS BAR */}
                        <div className="bg-[#CDB4DB] p-2 flex justify-between items-center px-4">
                            <a href="index.html" className="text-white hover:text-purple-100 transition-colors flex items-center gap-1 font-bold text-xs" title="Főoldal">
                                <Icons.Back className="w-4 h-4" /> VISSZA
                            </a>
                            <span className="text-white text-xs font-bold tracking-widest uppercase">Altatás & Csend</span>
                            <button onClick={() => setIsNightMode(!isNightMode)} className="text-white hover:text-yellow-100 transition-colors" title="Éjszakai mód váltása">
                                {isNightMode ? <Icons.Sun className="w-5 h-5 text-yellow-300" /> : <Icons.Moon className="w-5 h-5" />}
                            </button>
                        </div>

                        {/* CÍMEK ÉS DEKORÁCIÓK */}
                        <div className="p-6 text-center relative">
                            <div className="absolute top-4 left-4 w-8 h-8 rounded-full bg-[#FFC8DD] opacity-50"></div>
                            <div className="absolute bottom-4 right-4 w-6 h-6 rounded-full bg-[#BDE0FE] opacity-50"></div>
                            <h1 className="text-4xl font-bold text-gray-700 mb-1" style={{fontFamily: 'Patrick Hand'}}>Altatás & Hangok</h1>
                            <p className="text-gray-400 text-sm font-semibold tracking-wide uppercase">Természetes zajok és dallamok</p>
                        </div>
                        
                        {/* TABS */}
                        <div className="flex justify-center gap-4 px-6 pb-6">
                            <button onClick={() => setActiveTab('sounds')} className={`flex-1 py-3 px-4 rounded-2xl font-bold transition-all text-sm uppercase tracking-wide flex items-center justify-center gap-2 ${activeTab === 'sounds' ? 'bg-[#cdb4db] text-white shadow-md transform -translate-y-1' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}><Icons.Baby className="w-4 h-4" /> Hangok</button>
                            <button onClick={() => setActiveTab('tips')} className={`flex-1 py-3 px-4 rounded-2xl font-bold transition-all text-sm uppercase tracking-wide flex items-center justify-center gap-2 ${activeTab === 'tips' ? 'bg-[#ffafcc] text-white shadow-md transform -translate-y-1' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}><Icons.Utensils className="w-4 h-4" /> Tanácsok</button>
                        </div>
                    </div>

                    {/* TARTALMAK */}
                    <div className="px-4 space-y-6 flex-grow">

                        {activeTab === 'sounds' && (
                            <>
                                {/* JÁTSZÓ KÁRTYA CELLUX DISZÍTÉSSEL */}
                                <div className="paper-card relative mb-6">
                                    <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 w-32 h-6 bg-[#f0f0f0] bg-opacity-80 rotate-1 shadow-sm z-10" style={{clipPath: 'polygon(0 0, 100% 0, 95% 100%, 5% 100%)'}}></div>
                                    
                                    <div className="p-6 flex flex-col items-center justify-center">
                                        
                                        {/* Pulzáló kör az aktív gyönyörű ikonnal */}
                                        <div className="relative flex items-center justify-center mb-4 mt-2">
                                            <div 
                                                className={`absolute w-28 h-28 rounded-full ${isPlaying ? 'pulsing-glow' : ''} transition-all duration-1000`}
                                                style={{ backgroundColor: 'var(--main-accent)', color: 'var(--main-accent)' }}
                                            ></div>
                                            
                                            <button 
                                                onClick={togglePlay} 
                                                className="relative w-24 h-24 bg-gradient-to-tr from-[#cdb4db] to-[#bde0fe] rounded-full flex items-center justify-center text-white shadow-lg transform active:scale-95 transition-all duration-200 z-10"
                                                style={{ boxShadow: isPlaying ? 'none' : '0 6px 0 #9a82a8' }}
                                            >
                                                {/* Dinamikusan betöltődő gyönyörű és hatalmas SVG ikon a gomb közepén */}
                                                <ActiveSoundIcon className="h-10 w-10 text-white" />
                                            </button>
                                        </div>

                                        <h3 className="text-sm font-semibold text-gray-400 uppercase tracking-widest handwritten text-lg">
                                            {isPlaying ? 'Lejátszás alatt' : 'Készenlétben'}
                                        </h3>
                                        <h2 className="text-2xl font-bold text-gray-700 handwritten mt-1">
                                            {activeSoundLabel}
                                        </h2>
                                    </div>

                                    {/* ALACSONYABB HIERARCHIÁJÚ ÖSSZECSUKHATÓ IDŐZÍTŐ */}
                                    <div className="border-t border-dashed border-gray-200 bg-[#fffdfa] transition-all">
                                        
                                        {/* Minimalista összecsukó fejrész */}
                                        <button 
                                            onClick={() => setIsTimerOpen(!isTimerOpen)}
                                            className="w-full py-3 px-6 flex items-center justify-between text-xs font-bold text-gray-400 uppercase tracking-wider hover:text-gray-600 transition-colors"
                                        >
                                            <span className="flex items-center gap-1.5">
                                                <Icons.Timer className="w-4 h-4 text-gray-400" />
                                                {timeRemaining > 0 ? `Aktív időzítő: ${formatTime(timeRemaining)}` : 'Időzítő: Végtelen'}
                                            </span>
                                            <span className="text-gray-300 font-bold">{isTimerOpen ? '▲ BEZÁRÁS' : '▼ BEÁLLÍTÁS'}</span>
                                        </button>

                                        {/* Lenyíló időválasztó szekció */}
                                        {isTimerOpen && (
                                            <div className="px-6 pb-6 pt-1 flex flex-col items-center border-t border-dashed border-gray-100">
                                                <div className="flex flex-wrap gap-2 justify-center">
                                                    {[15, 30, 45, 60].map((mins) => (
                                                        <button 
                                                            key={mins}
                                                            onClick={() => handleTimerSet(mins)}
                                                            className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${timerPreset === mins ? 'bg-[#cdb4db] text-white shadow-inner' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                                                        >
                                                            {mins}p
                                                        </button>
                                                    ))}
                                                    <button 
                                                        onClick={() => handleTimerSet(0)}
                                                        className={`px-4 py-2 rounded-xl text-sm font-bold transition-all ${timerPreset === 0 ? 'bg-[#cdb4db] text-white' : 'bg-gray-100 text-gray-500'}`}
                                                    >
                                                        Végtelen
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* HANGOK RÁCSOS VÁLASZTÓJA */}
                                <div className="space-y-4">
                                    <h3 className="text-2xl font-bold text-gray-700 mb-2 px-2" style={{fontFamily: 'Patrick Hand'}}>Válassz egy hangot:</h3>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        {soundsList.map((snd) => {
                                            const SoundIcon = Icons[snd.id];
                                            const isThisActiveAndPlaying = activeSound === snd.id && isPlaying;
                                            return (
                                                <button
                                                    key={snd.id}
                                                    onClick={() => selectSound(snd.id, snd.label)}
                                                    className={`paper-card p-5 flex flex-col items-center justify-center text-center transition-all duration-200 hover:scale-[1.03] active:scale-95 border-2 ${isThisActiveAndPlaying ? 'sound-active-card border-[#cdb4db]' : 'border-transparent'}`}
                                                >
                                                    {/* Gyönyörű vektoros SVG ikonok az apró és unalmas emojik helyett */}
                                                    <div className={`w-14 h-14 rounded-2xl ${snd.color} flex items-center justify-center text-gray-600 shadow-sm mb-3 transition-colors ${isThisActiveAndPlaying ? 'bg-opacity-80' : ''}`}>
                                                        <SoundIcon className="h-7 w-7" />
                                                    </div>
                                                    <span className="font-bold text-gray-700 text-sm tracking-wide">{snd.label}</span>
                                                    {isThisActiveAndPlaying && (
                                                        <span className="text-[10px] uppercase font-bold text-[#cdb4db] mt-1 tracking-widest animate-pulse">Szól...</span>
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </>
                        )}

                        {activeTab === 'tips' && (
                            /* SZAKÉRTŐI TANÁCSOK - FÜZETLAP */
                            <div className="paper-card border-l-8 border-[#ffafcc]">
                                <div className="p-6 bg-[url('https://www.transparenttextures.com/patterns/notebook.png')]">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-3xl font-bold text-gray-700" style={{fontFamily: 'Patrick Hand'}}>Szakértői Tanácsok</h2>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        <div className="border-b border-gray-100 pb-4">
                                            <h4 className="font-bold text-gray-800 text-base handwritten text-lg">💤 Ébrenléti ablakok (1 éves korig)</h4>
                                            <p className="text-gray-500 text-sm leading-relaxed mt-2">
                                                Az ébrenléti ablak az az időtartam, ameddig a baba képes ébren maradni anélkül, hogy túlfáradna.
                                            </p>
                                            <ul className="text-xs text-gray-500 list-disc list-inside mt-2 space-y-1">
                                                <li><strong>0-3 hónap:</strong> 45-90 perc</li>
                                                <li><strong>3-6 hónap:</strong> 1.5 - 2.5 óra</li>
                                                <li><strong>6-9 hónap:</strong> 2.5 - 3 óra</li>
                                                <li><strong>9-12 hónap:</strong> 3 - 4 óra</li>
                                            </ul>
                                        </div>

                                        <div className="border-b border-gray-100 pb-4">
                                            <h4 className="font-bold text-gray-800 text-base handwritten text-lg">🧸 Biztonságos alvási környezet</h4>
                                            <p className="text-gray-500 text-sm leading-relaxed mt-2">
                                                Fektesd a babát kemény, sík felületre (matracra), mindig a hátára. Kerüljük a puha játékokat, párnákat és vastag takarókat a kiságyban az első évben. Az ideális szobahőmérséklet alváshoz: 18-20°C.
                                            </p>
                                        </div>

                                        <div>
                                            <h4 className="font-bold text-gray-800 text-base handwritten text-lg">💡 Miért segít a fehér zaj?</h4>
                                            <p className="text-gray-500 text-sm leading-relaxed mt-2">
                                                Az anyaméhben a babák folyamatos, ritmikus szívverést és áramlási zajokat hallanak (kb. 70-80 dB). A teljes csend szokatlan számukra, így a fehér zaj megnyugtató biztonságérzetet teremt nekik.
                                            </p>
                                        </div>
                                    </div>

                                    <div className="mt-8 text-center">
                                        <p className="handwritten text-gray-400 text-xl transform -rotate-1">
                                            "Békés, szép álmokat a babának!"
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* ALSÓ NAVIGÁCIÓS BAR */}
                    <nav className="bg-white border-t border-gray-100 px-6 py-4 rounded-t-[2rem] shadow-[0_-4px_24px_rgba(0,0,0,0.04)] fixed bottom-0 left-0 right-0 z-50 transition-colors">
                        <div className="flex justify-around items-center">
                            <a href="index.html" className="flex flex-col items-center text-gray-400 hover:text-[#cdb4db] transition-colors">
                                <Icons.Home className="w-6 h-6" />
                                <span className="text-xs font-semibold mt-1">Főoldal</span>
                            </a>
                            <a href="hozzataplalas.html" className="flex flex-col items-center text-gray-400 hover:text-emerald-500 transition-colors">
                                <Icons.Utensils className="w-6 h-6" />
                                <span className="text-xs font-semibold mt-1">Ételek</span>
                            </a>
                            <a href="altatas.html" className="flex flex-col items-center text-[#cdb4db] font-bold">
                                <Icons.Moon className="w-6 h-6" />
                                <span className="text-xs font-semibold mt-1">Altatás</span>
                            </a>
                        </div>
                    </nav>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
