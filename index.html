<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Portál</title>
    
    <!-- Tailwind CSS betöltése -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React és ReactDOM betöltése -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel a JSX fordításhoz a böngészőben -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Egyedi animációk és finomhangolások */
        body { background-color: #fafafa; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Ikonok (hogy ne kelljen külső csomag) ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const BabyIcon = ({ className }) => (
            <IconBase className={className}>
                <path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.8 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.8A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/>
            </IconBase>
        );
        const UtensilsIcon = ({ className }) => (
            <IconBase className={className}>
                <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
            </IconBase>
        );
        const MoonIcon = ({ className }) => (
            <IconBase className={className}>
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </IconBase>
        );
        const StarIcon = ({ className }) => (
            <IconBase className={className}>
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </IconBase>
        );
        const SettingsIcon = ({ className }) => (
            <IconBase className={className}>
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
            </IconBase>
        );
        const ArrowRightIcon = ({ className }) => (
            <IconBase className={className}>
                <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
            </IconBase>
        );

        // --- Fő Applikáció ---

        function BabyDashboard() {
            const [greeting, setGreeting] = useState('');

            useEffect(() => {
                const hour = new Date().getHours();
                if (hour < 10) setGreeting('Jó reggelt!');
                else if (hour < 18) setGreeting('Szép napot!');
                else setGreeting('Szép estét!');
            }, []);

            const handleNavigation = (url) => {
                window.location.href = url;
            };

            return (
                <div className="min-h-screen font-sans text-slate-800 flex flex-col items-center fade-in">
                
                {/* --- Minimalista Fejléc --- */}
                <div className="w-full max-w-md px-8 pt-12 pb-6">
                    <div className="flex justify-between items-start mb-6">
                    <div>
                        <span className="text-xs font-bold text-slate-400 uppercase tracking-[0.2em] mb-1 block">Baba Portál</span>
                        <h1 className="text-3xl font-light text-slate-800 tracking-tight">{greeting}</h1>
                    </div>
                    <div className="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center border border-slate-100">
                        <BabyIcon className="w-5 h-5 text-slate-400" />
                    </div>
                    </div>
                </div>

                {/* --- Fő Tartalom --- */}
                <div className="w-full max-w-md px-6 grid grid-cols-1 gap-5 pb-20">
                    
                    {/* 1. Hozzátáplálás Kártya */}
                    <div 
                    onClick={() => handleNavigation('hozzataplalas.html')}
                    className="group bg-white p-6 rounded-3xl shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)] border border-slate-50 hover:border-green-100 hover:shadow-lg hover:shadow-green-100/50 transition-all duration-300 cursor-pointer relative overflow-hidden"
                    >
                    <div className="absolute top-0 right-0 w-24 h-24 bg-green-50 rounded-bl-[4rem] -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                    
                    <div className="relative z-10 flex items-center justify-between">
                        <div className="flex items-center space-x-4">
                        <div className="w-12 h-12 bg-green-100 rounded-2xl flex items-center justify-center text-green-600 group-hover:bg-green-500 group-hover:text-white transition-colors duration-300">
                            <UtensilsIcon className="w-6 h-6" />
                        </div>
                        <div>
                            <h3 className="text-lg font-semibold text-slate-800">Hozzátáplálás</h3>
                            <p className="text-sm text-slate-400 font-medium">100 étel lista</p>
                        </div>
                        </div>
                        <div className="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transform translate-x-2 group-hover:translate-x-0 transition-all duration-300">
                            <ArrowRightIcon className="w-4 h-4 text-green-500" />
                        </div>
                    </div>
                    </div>

                    {/* 2. Altatás Kártya */}
                    <div 
                    onClick={() => handleNavigation('altatas.html')}
                    className="group bg-white p-6 rounded-3xl shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)] border border-slate-50 hover:border-indigo-100 hover:shadow-lg hover:shadow-indigo-100/50 transition-all duration-300 cursor-pointer relative overflow-hidden"
                    >
                    <div className="absolute top-0 right-0 w-24 h-24 bg-indigo-50 rounded-bl-[4rem] -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>

                    <div className="relative z-10 flex items-center justify-between">
                        <div className="flex items-center space-x-4">
                        <div className="w-12 h-12 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600 group-hover:bg-indigo-500 group-hover:text-white transition-colors duration-300">
                            <MoonIcon className="w-6 h-6" />
                        </div>
                        <div>
                            <h3 className="text-lg font-semibold text-slate-800">Altatás</h3>
                            <p className="text-sm text-slate-400 font-medium">Napló & Figyelő</p>
                        </div>
                        </div>
                        <div className="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transform translate-x-2 group-hover:translate-x-0 transition-all duration-300">
                            <ArrowRightIcon className="w-4 h-4 text-indigo-500" />
                        </div>
                    </div>
                    </div>

                    {/* Kiegészítő kártyák */}
                    <div className="grid grid-cols-2 gap-4 mt-2">
                    {/* Mérföldkövek */}
                    <div className="bg-white p-5 rounded-3xl shadow-[0_2px_15px_-8px_rgba(0,0,0,0.05)] border border-slate-50 flex flex-col items-center justify-center text-center gap-3 hover:scale-[1.02] transition-transform cursor-pointer">
                        <StarIcon className="w-6 h-6 text-orange-300" />
                        <span className="text-sm font-semibold text-slate-600">Mérföldkövek</span>
                    </div>

                    {/* Beállítások */}
                    <div className="bg-white p-5 rounded-3xl shadow-[0_2px_15px_-8px_rgba(0,0,0,0.05)] border border-slate-50 flex flex-col items-center justify-center text-center gap-3 hover:scale-[1.02] transition-transform cursor-pointer">
                        <SettingsIcon className="w-6 h-6 text-slate-300" />
                        <span className="text-sm font-semibold text-slate-600">Beállítások</span>
                    </div>
                    </div>

                </div>

                <div className="mt-auto py-6 text-center">
                    <p className="text-xs text-slate-300 font-medium">verzió 1.1 • Minimal</p>
                </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BabyDashboard />);
    </script>
</body>
</html>
