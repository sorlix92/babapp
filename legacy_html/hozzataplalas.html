    <style>
        @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Quicksand:wght@400;600;700&display=swap');

        :root {
            --paper-bg: #fffdf5;
            --text-color: #5d5d5d;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: #f7f3e8; 
            color: var(--text-color);
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .handwritten { font-family: 'Patrick Hand', cursive; }

        .checkbox-container {
            position: relative;
            cursor: pointer;
            user-select: none;
        }
        
        .custom-box {
            width: 24px;
            height: 24px;
            border: 2px solid #ccc;
            border-radius: 6px;
            background-color: white;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tick-mark {
            transform: scale(0);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .is-checked .tick-mark { transform: scale(1); }
        .is-checked .custom-box { border-color: #88d498; background-color: #f0fff4; }

        .paper-card {
            background: white;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .btn-primary {
            background-color: #ffafcc;
            color: white;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            border-radius: 12px;
            box-shadow: 0 4px 0 #cd84a1;
            transition: all 0.1s;
        }
        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #cd84a1;
        }

        /* Nyomtatási nézet */
        @media print {
            body { background: white; background-image: none; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .paper-card { box-shadow: none; border: 1px solid #eee; break-inside: avoid; }
            .print-cols { column-count: 2; column-gap: 20px; }
        }
        .print-only { display: none; }
    </style>

                        setDb(fbDb);

                    } catch (error) { 
                        console.error("Firebase hiba:", error);
                        setSyncStatus('error');
                    }
                };
                initFirebase();
            }, []);

            React.useEffect(() => {
                if (!user || !db || !isLoggedIn || !sharedCode) return;
                setSyncStatus('syncing');
                
                const normalizedCode = sharedCode.trim().toUpperCase();
                const docRef = db.collection('checklists').doc(normalizedCode);

                const unsubscribe = docRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        setCheckedItems(data.checkedItems || {});
                        setItemDetails(data.itemDetails || {});
                        setSyncStatus('synced');
                    } else {
                        docRef.set({
                            created: firebase.firestore.FieldValue.serverTimestamp(),
                            checkedItems: {},
                            itemDetails: {}
                        });
                        setSyncStatus('synced');
                    }
                }, (error) => { setSyncStatus('error'); });
                return () => unsubscribe();
            }, [user, db, isLoggedIn, sharedCode]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (sharedCode.trim().length < 3) return alert("Kérlek adj meg egy legalább 3 karakteres kódot!");

                setSharedCode(cleanCode);
                localStorage.setItem('babyListCode', cleanCode);
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                localStorage.removeItem('babyListCode');
                setIsLoggedIn(false); setSharedCode(''); setCheckedItems({}); setItemDetails({});

            const toggleCheck = async (item) => {
                const newStatus = !checkedItems[item];
                setCheckedItems(prev => ({ ...prev, [item]: newStatus }));
                
                if (db && sharedCode) {
                    try {
                        const normalizedCode = sharedCode.trim().toUpperCase();
                        const docRef = db.collection('checklists').doc(normalizedCode);
                        await docRef.update({ [`checkedItems.${item}`]: newStatus });
                    } catch (error) { console.error(error); }
                }
            };
            
            const saveItemReaction = async (item, reactionId, e) => {
                e.stopPropagation(); // Prevent toggling checkbox when clicking reaction
                
                // If clicking same reaction, toggle off (optional, but good UX)
                const currentReaction = itemDetails[item]?.reaction;
                const newReaction = currentReaction === reactionId ? null : reactionId;
                
                // Preserve date/note if exists
                const existingDetails = itemDetails[item] || {};
                const newDetail = { ...existingDetails, reaction: newReaction };
                
                if (!newDetail.date) {
                     newDetail.date = new Date().toISOString().split('T')[0];
                }

                const newDetails = { ...itemDetails, [item]: newDetail };
                setItemDetails(newDetails);
                
                if (db && sharedCode) {
                    try {
                        const normalizedCode = sharedCode.trim().toUpperCase();
                        const docRef = db.collection('checklists').doc(normalizedCode);
                        await docRef.update({ [`itemDetails.${item}`]: newDetail });
                    } catch (error) { console.error(error); }
                }
            };

                setEditingItem(null);

                    try {
                        const normalizedCode = sharedCode.trim().toUpperCase();
                        const docRef = db.collection('checklists').doc(normalizedCode);
                        await docRef.update({ [`itemDetails.${item}`]: detail });
                    } catch (error) { console.error(error); }
                }
            };

                         const normalizedCode = sharedCode.trim().toUpperCase();
                         const docRef = db.collection('checklists').doc(normalizedCode);
                         await docRef.update(updates);
                    } catch(e) {}
                }
            };
            
            const printShoppingList = () => {
                window.print();
            };
            
            // Toggle Logic to keep them mutually exclusive (optional but cleaner)
            const toggleFavorites = () => {
                if (!filterFavorites) setFilterProblems(false);
                setFilterFavorites(!filterFavorites);
            };
            
            const toggleProblems = () => {
                if (!filterProblems) setFilterFavorites(false);
                setFilterProblems(!filterProblems);
            };

            // ---- Components ----

            const CheckItem = ({ label, isChecked, onToggle, details, onEdit, onReaction }) => (
                <div className="flex items-center gap-2 group">
                    <div onClick={onToggle} className={`checkbox-container flex-1 flex items-center gap-2 p-2 rounded-lg hover:bg-black hover:bg-opacity-5 transition-colors ${isChecked ? 'is-checked' : ''}`}>
                        <div className="custom-box flex-shrink-0">
                            <span className="tick-mark text-green-500 font-bold text-lg leading-none handwritten">✓</span>
                        </div>
                        <div className="flex-1 min-w-0">
                            <span className={`text-base handwritten text-lg block truncate ${isChecked ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{label}</span>
                            {details?.date && <span className="text-[10px] text-gray-400 font-sans">{details.date}</span>}
                        </div>
                    </div>

                    {/* Quick Reactions Row - Always visible or visible on check? Keeping always visible for quick access as requested */}
                    <div className="flex items-center gap-1">
                        {REACTIONS.map(r => (
                            <button 
                                key={r.id}
                                onClick={(e) => onReaction(label, r.id, e)}
                                className={`text-lg p-1 rounded hover:bg-gray-100 transition-transform active:scale-95 ${details?.reaction === r.id ? 'bg-yellow-100 scale-110 ring-1 ring-yellow-300' : 'opacity-40 hover:opacity-100'}`}
                                title={r.label}
                            >
                                {r.icon}
                            </button>
                        ))}
                    </div>

                    {/* Edit button for Notes/Date */}
                    <button onClick={onEdit} className={`p-2 rounded-full hover:bg-gray-100 text-gray-300 hover:text-gray-500 ${details?.note ? 'text-pink-400' : ''}`}>
                         <Icons.Edit className="w-4 h-4" />
                    </button>
                </div>
            );
            
            const ItemDetailModal = ({ item, currentDetails, onClose, onSave }) => {
                const [date, setDate] = React.useState(currentDetails?.date || new Date().toISOString().split('T')[0]);
                // Reaction handled in list, but keeping here for syncing
                const [reaction, setReaction] = React.useState(currentDetails?.reaction || null); 
                const [note, setNote] = React.useState(currentDetails?.note || '');

                return (
                    <div className="fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl relative">
                            <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><Icons.Close className="w-6 h-6"/></button>
                            <h3 className="text-2xl font-bold text-gray-800 mb-4 handwritten">{item}</h3>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-gray-500 mb-1">Dátum</label>
                                    <input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full p-2 border rounded-xl bg-gray-50" />
                                </div>
                                
                                {/* Reaction in modal too, just in case */}
                                <div>
                                    <label className="block text-sm font-bold text-gray-500 mb-2">Reakció</label>
                                    <div className="flex justify-between">
                                        {REACTIONS.map(r => (
                                            <button 
                                                key={r.id}
                                                onClick={() => setReaction(r.id)}
                                                className={`flex flex-col items-center gap-1 p-2 rounded-xl transition-all ${reaction === r.id ? 'bg-pink-100 scale-110' : 'hover:bg-gray-50'}`}
                                            >
                                                <span className="text-2xl">{r.icon}</span>
                                                <span className="text-[10px] uppercase font-bold text-gray-400">{r.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-bold text-gray-500 mb-1">Jegyzet</label>
                                    <textarea 
                                        value={note} 
                                        onChange={e => setNote(e.target.value)}
                                        placeholder="Megjegyzés..."
                                        className="w-full p-3 border rounded-xl bg-gray-50 h-24 resize-none focus:ring-2 focus:ring-pink-200 outline-none"
                                    ></textarea>
                                </div>
                                
                                <button 
                                    onClick={() => onSave(item, { date, reaction, note })}
                                    className="w-full btn-primary py-3 rounded-xl mt-2"
                                >
                                    Mentés
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const ShoppingListView = () => {
                const uncheckedCategories = foodCategories.map(cat => {
                    const unchecked = cat.items.filter(item => !checkedItems[item]);
                    return { ...cat, items: unchecked };
                }).filter(cat => cat.items.length > 0);

                return (
                    <div className="fixed inset-0 bg-white z-[70] overflow-y-auto">
                        <div className="max-w-3xl mx-auto min-h-screen flex flex-col">
                            <div className="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10 no-print">
                                <h2 className="text-2xl font-bold text-gray-700 handwritten">Bevásárlólista</h2>
                                <div className="flex gap-2">
                                    <button onClick={printShoppingList} className="flex items-center gap-2 bg-blue-100 text-blue-600 px-4 py-2 rounded-xl font-bold hover:bg-blue-200">
                                        <Icons.Print className="w-4 h-4" /> Nyomtatás
                                    </button>
                                    <button onClick={() => setShowShoppingList(false)} className="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl font-bold hover:bg-gray-200">
                                        Bezárás
                                    </button>
                                </div>
                            </div>
                            <div className="p-6 print-cols">
                                <div className="mb-6 text-center print-only">
                                    <h1 className="text-3xl font-bold mb-2">Bevásárlólista</h1>
                                    <p className="text-gray-500">Baba Hozzátáplálás - Még megkóstolandó ételek</p>
                                </div>
                                {uncheckedCategories.length === 0 ? (
                                    <div className="text-center py-20 text-gray-400">
                                        <p>Minden ételt kipróbáltatok! 🎉</p>
                                    </div>
                                ) : (
                                    uncheckedCategories.map(cat => (
                                        <div key={cat.id} className="mb-6 break-inside-avoid">
                                            <h3 className={`font-bold text-lg mb-2 ${cat.textColor} border-b pb-1 border-gray-100`}>{cat.title}</h3>
                                            <div className="grid grid-cols-2 gap-2">
                                                {cat.items.map(item => (
                                                    <div key={item} className="flex items-center gap-2 text-gray-600 text-sm">
                                                        <div className="w-4 h-4 border border-gray-300 rounded-md"></div>
                                                        {item}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            // ---- Main Render ----

            if (configError) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white paper-card p-8 max-w-lg w-full text-center border-4 border-red-200">
                            <h1 className="text-2xl font-bold text-red-500 mb-4">⚠️ Hiányzik a beállítás!</h1>
                        </div>
                    </div>
                );
            }

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white paper-card p-8 max-w-sm w-full text-center border-4 border-[#FFC8DD] border-dashed">
                            <div className="mb-6 flex justify-center"><div className="p-4 bg-[#FFC8DD] rounded-full text-white"><Icons.Baby className="w-12 h-12" /></div></div>
                            <h1 className="text-3xl font-bold text-gray-700 mb-2" style={{fontFamily: 'Patrick Hand'}}>Hozzátáplálási napló</h1>
                            <p className="text-gray-400 mb-6 handwritten text-xl">Írj be egy jelszót, hogy megoszthasd a pároddal is a listádat</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="text" 
                                    value={sharedCode} 
                                    onChange={(e) => setSharedCode(e.target.value.toUpperCase())}
                                    placeholder="PL. BABA2025" 
                                    className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-[#FFC8DD] outline-none text-center text-xl font-bold uppercase tracking-widest text-gray-600 handwritten bg-[#fffdf5]" 
                                />
                                <button type="submit" className="w-full btn-primary py-3 px-4 text-lg">BELÉPÉS</button>
                            </form>
                        </div>
                    </div>
                );
            }

            let checkedFoodCount = 0;
            const totalFoodItems = foodCategories.reduce((acc, cat) => acc + cat.items.length, 0);
            foodCategories.forEach(cat => cat.items.forEach(i => { if (checkedItems[i]) checkedFoodCount++; }));
            const progress = Math.round((checkedFoodCount / totalFoodItems) * 100);

            // Filter Logic including Favorites and Problematic
            const filteredCategories = foodCategories.map(cat => ({
                ...cat,
                items: cat.items.filter(item => {
                    const matchesSearch = item.toLowerCase().includes(searchTerm.toLowerCase());
                    let matchesFilter = true;
                    
                    if (filterFavorites) {
                        matchesFilter = (itemDetails[item]?.reaction === 'love');
                    } else if (filterProblems) {
                        // "Nem kérte" or "Allergia"
                        matchesFilter = ['dislike', 'allergy'].includes(itemDetails[item]?.reaction);
                    }
                    
                    return matchesSearch && matchesFilter;
                })
            })).filter(cat => cat.items.length > 0);

            return (
                <div className="min-h-screen pb-24 max-w-3xl mx-auto no-print">
                    <div className="bg-white rounded-b-[2rem] shadow-sm mb-6 overflow-hidden border-b-4 border-[#FFC8DD] border-dashed">
                        
                        {/* HEADER */}
                        <div className="bg-[#FFC8DD] p-2 flex justify-between items-center px-4">
                             <button onClick={() => setShowShoppingList(true)} className="text-white hover:text-pink-100 transition-colors flex items-center gap-1 font-bold text-xs" title="Bevásárlólista">
                                <Icons.Cart className="w-4 h-4" /> LISTA
                             </button>
                             <span className="text-white text-xs font-bold tracking-widest uppercase">KÓD: {sharedCode}</span>
                             <button onClick={handleLogout} className="text-white hover:text-red-100 transition-colors" title="Kijelentkezés">
                                <Icons.LogOut className="w-5 h-5" />
                             </button>
                        </div>

                        <div className="p-6 text-center relative">
                             <div className="absolute top-4 left-4 w-8 h-8 rounded-full bg-[#CDEAC0] opacity-50"></div>
                             <div className="absolute bottom-4 right-4 w-6 h-6 rounded-full bg-[#BDE0FE] opacity-50"></div>
                             <div className="absolute top-10 right-10 w-4 h-4 rounded-full bg-[#FAE1DD] opacity-50"></div>
                             <h1 className="text-4xl font-bold text-gray-700 mb-1" style={{fontFamily: 'Patrick Hand'}}>Első 100 Étel</h1>
                             <p className="text-gray-400 text-sm font-semibold tracking-wide uppercase">Kóstolási Napló & Csekklista</p>
                        </div>
                        
                        <div className="flex justify-center gap-4 px-6 pb-6">
                            <button onClick={() => setActiveTab('foods')} className={`flex-1 py-3 px-4 rounded-2xl font-bold transition-all text-sm uppercase tracking-wide flex items-center justify-center gap-2 ${activeTab === 'foods' ? 'bg-[#ffafcc] text-white shadow-md transform -translate-y-1' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}><Icons.Utensils className="w-4 h-4" /> Ételek</button>
                            <button onClick={() => setActiveTab('checklist')} className={`flex-1 py-3 px-4 rounded-2xl font-bold transition-all text-sm uppercase tracking-wide flex items-center justify-center gap-2 ${activeTab === 'checklist' ? 'bg-[#cdb4db] text-white shadow-md transform -translate-y-1' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}><Icons.List className="w-4 h-4" /> Ellenőrző</button>
                        </div>
                    </div>

                    {activeTab === 'foods' && (
                        <>
                            {/* SEARCH AND FILTER BAR */}
                            <div className="px-6 mb-4 flex gap-2">
                                <div className="relative flex-1">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <Icons.Search className="h-5 w-5 text-gray-400" />
                                    </div>
                                    <input
                                        type="text"
                                        className="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:placeholder-gray-300 focus:border-pink-300 focus:ring-2 focus:ring-pink-100 sm:text-sm transition duration-150 ease-in-out shadow-sm"
                                        placeholder="Keresés az ételek között..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <button 
                                    onClick={toggleFavorites}
                                    className={`px-3 rounded-xl border-2 transition-all flex items-center justify-center ${filterFavorites ? 'bg-pink-100 border-pink-300 text-pink-600 shadow-inner' : 'bg-white border-gray-200 text-gray-400'}`}
                                    title="Kedvencek"
                                >
                                    <Icons.Heart className="w-6 h-6" filled={filterFavorites} />
                                </button>
                                <button 
                                    onClick={toggleProblems}
                                    className={`px-3 rounded-xl border-2 transition-all flex items-center justify-center ${filterProblems ? 'bg-orange-100 border-orange-300 text-orange-600 shadow-inner' : 'bg-white border-gray-200 text-gray-400'}`}
                                    title="Problémás ételek (Allergia/Nem ízlett)"
                                >
                                    <Icons.Warning className="w-6 h-6" filled={filterProblems} />
                                </button>
                            </div>

                            <div className="px-6 mb-6">
                                <div className="flex justify-between items-end mb-2 px-2"><span className="handwritten text-xl text-gray-500">Haladás:</span><span className="font-bold text-[#ffafcc] text-lg">{progress}%</span></div>
                                <div className="h-4 bg-white rounded-full p-1 shadow-inner"><div className="h-full rounded-full bg-gradient-to-r from-[#ffafcc] to-[#ffc8dd] transition-all duration-1000" style={{width: `${progress}%`}}></div></div>
                            </div>
                        </>
                    )}

                    <div className="px-4 space-y-6">
                        {activeTab === 'foods' ? (
                            filteredCategories.length > 0 ? (
                                filteredCategories.map(cat => {
                                    const checkedInCat = cat.items.filter(i => checkedItems[i]).length;
                                    const IconComp = Icons[cat.icon];
                                    return (
                                        <div key={cat.id} className="paper-card relative">
                                            <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 w-32 h-6 bg-[#f0f0f0] bg-opacity-80 rotate-1 shadow-sm z-10" style={{clipPath: 'polygon(0 0, 100% 0, 95% 100%, 5% 100%)'}}></div>
                                            <div className={`${cat.headerColor} p-4 flex items-center justify-between`}>
                                                <div className="flex items-center gap-3"><div className="bg-white bg-opacity-80 p-2 rounded-full text-gray-600"><IconComp className="w-5 h-5" /></div><h2 className="font-bold text-xl text-gray-700" style={{fontFamily: 'Patrick Hand'}}>{cat.title}</h2></div>
                                                <div className="bg-white bg-opacity-50 px-3 py-1 rounded-full text-sm font-bold text-gray-600">{checkedInCat}/{cat.items.length}</div>
                                            </div>
                                            <div className={`p-4 grid grid-cols-1 gap-y-2 bg-white border-t-2 ${cat.borderColor} border-dashed`}>
                                                {cat.items.map(item => (
                                                    <CheckItem 
                                                        key={item} 
                                                        label={item} 
                                                        isChecked={checkedItems[item]} 
                                                        onToggle={() => toggleCheck(item)} 
                                                        details={itemDetails[item]}
                                                        onReaction={saveItemReaction}
                                                        onEdit={() => setEditingItem(item)}
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                    )
                                })
                            ) : (
                                <div className="text-center py-10 text-gray-400">
                                    <p>
                                        {filterFavorites ? "Nincs kedvenc étel." : 
                                         filterProblems ? "Nincs problémás étel (Allergia/Nem ízlett)." :
                                         `Nincs találat erre: "${searchTerm}"`}
                                    </p>
                                </div>
                            )
                        ) : (
                            <div className="paper-card border-l-8 border-[#cdb4db]">
                                <div className="p-6 bg-[url('https://www.transparenttextures.com/patterns/notebook.png')]">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-2xl font-bold text-[#8e7d96]" style={{fontFamily: 'Patrick Hand'}}>Étkezés Előtt</h2>
                                        <button onClick={resetDailyChecklist} className="text-xs bg-[#f2e6f7] hover:bg-[#e0d0e8] text-[#8e7d96] px-3 py-2 rounded-lg font-bold flex items-center gap-1 transition-colors"><Icons.Refresh className="w-3 h-3" /> Újra</button>
                                    </div>
                                    <div className="space-y-2">{checklistQuestions.map(q => (<div key={q} className="border-b border-[#f0f0f0] pb-2 last:border-0"><CheckItem label={q} isChecked={checkedItems[q]} onToggle={() => toggleCheck(q)} onEdit={() => {}} /></div>))}</div>
                                    <div className="mt-8 text-center"><p className="handwritten text-gray-400 text-lg transform -rotate-2">"Jó étvágyat a babának!"</p></div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    <div className="fixed bottom-4 right-4 z-50 pointer-events-none">
                        <div className={`px-4 py-2 rounded-full text-xs font-bold shadow-lg flex items-center gap-2 transition-all transform ${syncStatus === 'synced' ? 'bg-white text-green-600 border border-green-200' : syncStatus === 'syncing' ? 'bg-white text-orange-500 border border-orange-200' : 'bg-gray-200 text-gray-500'}`}>
                            <div className={`w-2 h-2 rounded-full ${syncStatus === 'syncing' ? 'bg-orange-500 animate-pulse' : syncStatus === 'synced' ? 'bg-green-500' : 'bg-red-400'}`}></div>
                            {syncStatus === 'synced' ? 'Mentve' : syncStatus === 'syncing' ? 'Mentés...' : 'Nincs kapcsolat'}
                        </div>
                    </div>

                    {/* MODALS */}
                    {editingItem && (
                        <ItemDetailModal 
                            item={editingItem} 
                            currentDetails={itemDetails[editingItem]} 
                            onClose={() => setEditingItem(null)}
                            onSave={saveItemDetail}
                        />
                    )}
                    
                    {showShoppingList && <ShoppingListView />}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
