<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Okos Alvásnapló</title>
    
    <!-- Tailwind CSS (Formázás) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React és ReactDOM (A motor) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Hogy a böngésző megértse a kódot) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        /* Animációk */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="bg-slate-900 text-white h-screen overflow-hidden selection:bg-indigo-500 selection:text-white">

    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        // --- IKONOK (Hogy ne kelljen külső könyvtár) ---
        const Icons = {
            Moon: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Sun: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
            History: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/><path d="M12 7v5l4 2"/></svg>,
            Settings: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.35a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Sparkles: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 3v4"/><path d="M3 5h4"/><path d="M3 9h4"/></svg>,
            Send: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>,
            X: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18 6 6 18"/><path d="m6 6 18 18"/></svg>,
            Loader2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            BookOpen: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Edit2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
            Users: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Trash2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            LogOut: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
            CheckCircle: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Key: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/><path d="M12.5 10.5 13.5 11.5"/></svg>,
            ArrowRight: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>,
            ShieldCheck: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
        };

        // --- IMPORT MODULES VIA CDN ---
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, where, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const { useState, useEffect, useRef } = React;

        // --- FIREBASE KONFIGURÁCIÓ ---
        // FONTOS: Ezeket a változókat a rendszer automatikusan kitölti a preview-ban. 
        // Ha saját szerveren használod, cseréld le a lenti __firebase_config-ot a saját Firebase adataidra!
        
        const firebaseConfig = JSON.parse(__firebase_config); 
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Gemini API Kulcs (Ha van sajátod, írd be ide)
        const apiKey = ""; 

        // --- ADATOK ---
        const SLEEP_SCHEDULES = {
            "0-3_honap": { minMonth: 0, maxMonth: 3, label: "Újszülött (0-3 hó)", summary: "Kaotikus, igény szerinti alvás.", reqDay: "4-6 óra", reqNight: "8-10 óra", reqTotal: "14-17 óra", bedtime: "22:00 körül" },
            "4-6_honap": { minMonth: 4, maxMonth: 6, label: "Csecsemő (4-6 hó)", summary: "Kezd kialakulni a biológiai óra.", reqDay: "3-4 óra", reqNight: "10-12 óra", reqTotal: "12-15 óra", bedtime: "19:00 - 20:00" },
            "7-12_honap": { minMonth: 7, maxMonth: 12, label: "Baba (7-12 hó)", summary: "Stabil 2 alvásos napirend.", reqDay: "2-3 óra", reqNight: "11-12 óra", reqTotal: "12-14 óra", bedtime: "19:00 - 20:00" },
            "13+_honap": { minMonth: 13, maxMonth: 36, label: "Totyogó (1+ év)", summary: "Átállás 1 délutáni alvásra.", reqDay: "1.5-2 óra", reqNight: "11-12 óra", reqTotal: "11-13 óra", bedtime: "19:30 - 20:30" }
        };

        // --- FÜGGVÉNYEK ---
        const formatDuration = (ms) => {
            if (!ms && ms !== 0) return "--";
            const totalMinutes = Math.floor(ms / (1000 * 60));
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;
            return hours > 0 ? `${hours}ó ${minutes}p` : `${minutes}p`;
        };

        const formatTime = (timestamp) => {
            if (!timestamp) return "--:--";
            return new Date(timestamp).toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit' });
        };

        const toLocalISOString = (timestamp) => {
            const date = new Date(timestamp);
            const offset = date.getTimezoneOffset() * 60000;
            return (new Date(date - offset)).toISOString().slice(0, 16);
        };

        const calculateAgeMonths = (birthDateString) => {
            if (!birthDateString) return 0;
            const birth = new Date(birthDateString);
            const now = new Date();
            let months = (now.getFullYear() - birth.getFullYear()) * 12;
            months -= birth.getMonth();
            months += now.getMonth();
            return months <= 0 ? 0 : months;
        };

        async function callGemini(prompt) {
            try {
                const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
                }
                );
                if (!response.ok) throw new Error(`API hiba`);
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Nem sikerült választ kapni.";
            } catch (error) {
                return "Hiba történt a Gemini hívása közben.";
            }
        }

        // --- IDŐVONAL KOMPONENS ---
        const Timeline = ({ sleeps, now, dayStartHour, dayEndHour }) => {
            const todayStart = new Date(now).setHours(0,0,0,0);
            const totalDayMs = 24 * 60 * 60 * 1000;

            return (
                <div className="w-full mt-4 mb-2 select-none">
                    <div className="flex justify-between text-[10px] text-slate-400 font-mono mb-1 px-1">
                        <span>00:00</span>
                        <span>12:00</span>
                        <span>24:00</span>
                    </div>
                    <div className="h-6 bg-slate-200/50 rounded-lg relative overflow-hidden border border-slate-200 w-full">
                        <div 
                            className="absolute top-0 bottom-0 bg-orange-100/40 border-l border-r border-orange-200/30" 
                            style={{ 
                                left: `${(dayStartHour/24)*100}%`, 
                                width: `${((dayEndHour - dayStartHour)/24)*100}%` 
                            }}
                        />
                        {sleeps.map((sleep, idx) => {
                            const startRelative = Math.max(0, sleep.startTime - todayStart);
                            const leftPct = (startRelative / totalDayMs) * 100;
                            const endTime = sleep.endTime || now;
                            const duration = endTime - sleep.startTime;
                            const widthPct = (duration / totalDayMs) * 100;

                            if (sleep.endTime && sleep.endTime < todayStart) return null; 

                            return (
                                <div 
                                    key={idx}
                                    className={`absolute top-1 bottom-1 rounded-sm shadow-sm ${sleep.isDaySleep ? 'bg-orange-400' : 'bg-indigo-500'}`}
                                    style={{ 
                                        left: `${leftPct}%`, 
                                        width: `${Math.max(0.5, widthPct)}%`
                                    }}
                                />
                            );
                        })}
                        <div className="absolute top-0 bottom-0 w-0.5 bg-red-500 z-10" style={{ left: `${((now - todayStart) / totalDayMs) * 100}%` }} />
                    </div>
                </div>
            );
        };

        // --- FŐ APP KOMPONENS ---
        function App() {
            const [user, setUser] = useState(null);
            const [familyCode, setFamilyCode] = useState(() => localStorage.getItem('smart_familyCode') || "");
            const [inputCode, setInputCode] = useState(""); 
            
            const [birthDate, setBirthDate] = useState("");
            const [dayStartHour, setDayStartHour] = useState(6);
            const [dayEndHour, setDayEndHour] = useState(20);
            
            const [history, setHistory] = useState([]);
            const [activeSleep, setActiveSleep] = useState(null); 
            const [now, setNow] = useState(Date.now());
            const [isSyncing, setIsSyncing] = useState(false);
            
            const [showHistory, setShowHistory] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showAI, setShowAI] = useState(false);
            const [showExpert, setShowExpert] = useState(false);
            
            const [editingItem, setEditingItem] = useState(null);
            const [editStartTime, setEditStartTime] = useState("");
            const [editEndTime, setEditEndTime] = useState("");

            const [aiInput, setAiInput] = useState("");
            const [aiResponse, setAiResponse] = useState("");
            const [aiLoading, setAiLoading] = useState(false);

            // Auth Init
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                return onAuthStateChanged(auth, (u) => setUser(u));
            }, []);

            // Data Sync
            useEffect(() => {
                if (!user || !familyCode) {
                    setHistory([]);
                    setActiveSleep(null);
                    return;
                }

                setIsSyncing(true);
                const q = query(
                    collection(db, 'artifacts', appId, 'public', 'data', 'sleep_logs'),
                    where('familyId', '==', familyCode)
                );

                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const logs = [];
                    let active = null;
                    let settingsFound = false;

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.type === 'SETTINGS') {
                            setBirthDate(data.birthDate || "");
                            setDayStartHour(data.dayStartHour || 6);
                            setDayEndHour(data.dayEndHour || 20);
                            settingsFound = true;
                        } else if (data.endTime === null) {
                            active = { id: doc.id, ...data };
                        } else {
                            logs.push({ id: doc.id, ...data });
                        }
                    });
                    
                    logs.sort((a, b) => a.startTime - b.startTime);
                    setHistory(logs);
                    setActiveSleep(active);
                    setIsSyncing(false);

                    if (!settingsFound && familyCode) {
                        saveSettingsToCloud(familyCode, "", 6, 20);
                    }
                }, (error) => {
                    console.error("Hiba a szinkronizációnál:", error);
                    setIsSyncing(false);
                });

                return () => unsubscribe();
            }, [user, familyCode]);

            useEffect(() => {
                const timer = setInterval(() => setNow(Date.now()), 1000);
                return () => clearInterval(timer);
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const cleanCode = inputCode.trim();
                if (cleanCode.length < 3) return alert("A kód legyen legalább 3 karakter!");
                localStorage.setItem('smart_familyCode', cleanCode);
                setFamilyCode(cleanCode);
            };

            const logout = () => {
                if(confirm("Biztosan kilépsz?")) {
                    localStorage.removeItem('smart_familyCode');
                    setFamilyCode("");
                    setHistory([]);
                    setActiveSleep(null);
                    setShowSettings(false);
                    setInputCode("");
                }
            };

            const saveSettingsToCloud = async (code, bDate, startH, endH) => {
                if (!user) return;
                const settingsId = `settings_${code}`; 
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sleep_logs', settingsId), {
                    type: 'SETTINGS',
                    familyId: code,
                    birthDate: bDate,
                    dayStartHour: startH,
                    dayEndHour: endH
                });
            };

            const isDaySleep = (timestamp) => {
                const date = new Date(timestamp);
                const hour = date.getHours();
                return hour >= dayStartHour && hour < dayEndHour; 
            };

            const handleToggleSleep = async () => {
                if (!user || !familyCode) return;

                if (activeSleep) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sleep_logs', activeSleep.id), {
                        endTime: now,
                        duration: now - activeSleep.startTime
                    });
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sleep_logs'), {
                        type: 'SLEEP',
                        familyId: familyCode,
                        startTime: now,
                        endTime: null,
                        isDaySleep: isDaySleep(now),
                        duration: 0
                    });
                }
            };

            const handleDelete = async (id) => {
                if (confirm("Biztosan törlöd?")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sleep_logs', id));
                }
            };

            const startEditing = (item) => {
                setEditingItem(item);
                setEditStartTime(toLocalISOString(item.startTime));
                setEditEndTime(item.endTime ? toLocalISOString(item.endTime) : "");
            };

            const saveEdit = async () => {
                if (!editingItem) return;
                const newStart = new Date(editStartTime).getTime();
                let newEnd = editEndTime ? new Date(editEndTime).getTime() : null;
                
                if (!newEnd && editingItem.endTime !== null) return alert("Lezárt alvásnál kötelező a végidő!");
                if (newEnd && newEnd <= newStart) return alert("A vége nem lehet a kezdés előtt!");

                const updates = { startTime: newStart, isDaySleep: isDaySleep(newStart) };
                if (newEnd) {
                    updates.endTime = newEnd;
                    updates.duration = newEnd - newStart;
                }
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sleep_logs', editingItem.id), updates);
                setEditingItem(null);
            };

            const handleAskGemini = async (e) => {
                e.preventDefault();
                if (!aiInput.trim()) return;
                setAiLoading(true);
                const ageMonths = calculateAgeMonths(birthDate);
                const prompt = `Baba alvás kérdés: "${aiInput}". Kor: ${ageMonths} hó. Nappal: ${dayStartHour}-${dayEndHour}. Válaszolj magyarul, röviden, mint egy védőnő.`;
                const result = await callGemini(prompt);
                setAiResponse(result);
                setAiLoading(false);
                setAiInput("");
            };

            // Statisztika
            const todayStart = new Date(now).setHours(0, 0, 0, 0);
            const todaysSleeps = history.filter(h => (h.endTime || now) > todayStart);
            let totalDaySleep = 0;
            let totalNightSleep = 0;
            
            [...todaysSleeps, activeSleep].filter(Boolean).forEach(item => {
                const start = Math.max(item.startTime, todayStart);
                const end = item.endTime || now;
                const duration = Math.max(0, end - start);
                if (isDaySleep(item.startTime)) totalDaySleep += duration;
                else totalNightSleep += duration;
            });

            const timelineSleeps = [...todaysSleeps];
            if (activeSleep) timelineSleeps.push({ ...activeSleep, endTime: null });

            const currentDuration = activeSleep ? (now - activeSleep.startTime) : 0;
            const hDisplay = Math.floor(currentDuration / 3600000);
            const mDisplay = String(Math.floor((currentDuration % 3600000) / 60000)).padStart(2, '0');
            const sDisplay = String(Math.floor((currentDuration % 60000) / 1000)).padStart(2, '0');

            // --- RENDER: LOGIN KÉPERNYŐ ---
            if (!familyCode) {
                return (
                    <div className="h-screen w-full bg-slate-900 flex flex-col items-center justify-center p-6 relative overflow-hidden">
                        <div className="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
                        <div className="absolute top-0 -right-4 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
                        
                        <div className="bg-white/10 backdrop-blur-lg border border-white/20 w-full max-w-md rounded-3xl p-8 shadow-2xl z-10 text-white">
                            <div className="text-center mb-8">
                                <div className="w-20 h-20 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-300 ring-2 ring-indigo-400/50">
                                    <Icons.Users className="w-10 h-10" />
                                </div>
                                <h1 className="text-2xl font-black mb-2 tracking-tight">Okos Alvásnapló</h1>
                                <p className="text-slate-300 text-sm">
                                    Szia! A szinkronizációhoz kérlek add meg a családod egyedi azonosítóját.
                                </p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="relative group">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-400 transition-colors">
                                        <Icons.Key className="w-5 h-5"/>
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="Családi azonosító (pl. BoriBaba)"
                                        value={inputCode}
                                        onChange={(e) => setInputCode(e.target.value)}
                                        className="w-full bg-slate-800/50 border-2 border-slate-700 rounded-xl p-4 pl-12 font-medium text-lg focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-600 text-white"
                                        autoFocus
                                    />
                                </div>
                                
                                <button 
                                    type="submit"
                                    disabled={inputCode.length < 3}
                                    className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold p-4 rounded-xl disabled:opacity-50 transition shadow-lg flex items-center justify-center gap-2 transform active:scale-95"
                                >
                                    Belépés <Icons.ArrowRight className="w-5 h-5"/>
                                </button>
                            </form>

                            <div className="mt-8 bg-indigo-900/30 p-4 rounded-xl text-xs text-indigo-200 border border-indigo-500/30 flex items-start gap-2">
                                <div className="shrink-0 pt-0.5"><Icons.ShieldCheck className="w-4 h-4"/></div>
                                <p>
                                    <strong>Tipp:</strong> Találj ki egy kódot, és írd be ugyanezt a párod telefonján is. A rendszer megjegyzi a belépést.
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- RENDER: FŐ APP ---
            return (
                <div className={`h-screen w-full flex flex-col transition-colors duration-1000 relative overflow-hidden ${activeSleep ? 'bg-slate-900 text-slate-100' : 'bg-gradient-to-br from-amber-50 to-orange-100 text-slate-800'}`}>
                
                    {/* HEADER */}
                    <div className="p-4 bg-white/60 backdrop-blur-md shadow-sm z-10 border-b border-white/20">
                        <div className="flex justify-between items-start mb-2">
                            <div className="flex gap-3 sm:gap-6">
                                <div>
                                    <div className="flex items-center gap-1 text-[10px] uppercase font-bold tracking-widest opacity-60"><Icons.Sun className="w-3 h-3"/> Nappali</div>
                                    <div className="font-mono text-lg sm:text-xl font-bold">{formatDuration(totalDaySleep)}</div>
                                </div>
                                <div>
                                    <div className="flex items-center gap-1 text-[10px] uppercase font-bold tracking-widest opacity-60"><Icons.Moon className="w-3 h-3"/> Éjjeli</div>
                                    <div className="font-mono text-lg sm:text-xl font-bold">{formatDuration(totalNightSleep)}</div>
                                </div>
                            </div>

                            <div className="flex gap-2">
                                {isSyncing && <div className="p-2 bg-indigo-50 text-indigo-500 rounded-full animate-pulse"><Icons.Loader2 className="w-4 h-4 animate-spin"/></div>}
                                <button onClick={() => setShowSettings(true)} className="p-2 bg-white/50 rounded-full hover:bg-white transition shadow-sm text-slate-700"><Icons.Settings className="w-5 h-5"/></button>
                                <button onClick={() => setShowHistory(true)} className="p-2 bg-slate-800 text-white rounded-full hover:bg-slate-700 transition shadow-sm"><Icons.History className="w-5 h-5"/></button>
                            </div>
                        </div>
                        <Timeline sleeps={timelineSleeps} now={now} dayStartHour={dayStartHour} dayEndHour={dayEndHour} />
                    </div>

                    {/* ÓRA & GOMB */}
                    <div className="flex-1 flex flex-col items-center justify-center p-6 relative">
                        <div className="text-center mb-8 relative z-0">
                            <div className={`absolute -inset-10 rounded-full blur-3xl opacity-20 transition-colors duration-1000 ${activeSleep ? 'bg-blue-600' : 'bg-orange-500'}`}></div>
                            <div className="text-7xl sm:text-9xl font-black font-mono tracking-tighter tabular-nums select-none drop-shadow-sm">
                                {hDisplay}:{mDisplay}
                                <span className="text-2xl sm:text-4xl opacity-50 ml-1 font-normal align-top">.{sDisplay}</span>
                            </div>
                            
                            {activeSleep && (
                                <button 
                                    onClick={() => startEditing(activeSleep)}
                                    className="mt-4 text-xs bg-white/10 hover:bg-white/20 px-3 py-1 rounded-full text-slate-300 flex items-center gap-1 mx-auto transition"
                                >
                                    <Icons.Edit2 className="w-3 h-3"/> Kezdés javítása
                                </button>
                            )}
                        </div>

                        <button 
                            onClick={handleToggleSleep}
                            className={`w-48 h-48 sm:w-64 sm:h-64 rounded-full flex flex-col items-center justify-center shadow-[0_20px_60px_-15px_rgba(0,0,0,0.3)] transition-all transform active:scale-95 hover:scale-105 duration-300 relative z-10 ${
                                activeSleep 
                                ? 'bg-amber-400 text-amber-950 hover:bg-amber-300 ring-8 ring-amber-400/30' 
                                : 'bg-indigo-600 text-white hover:bg-indigo-500 ring-8 ring-indigo-600/30'
                            }`}
                        >
                            {activeSleep ? <Icons.Sun className="w-14 h-14 mb-2" /> : <Icons.Moon className="w-14 h-14 mb-2" />}
                            <span className="text-xl sm:text-2xl font-bold uppercase tracking-wider">
                                {activeSleep ? 'Ébresztés' : 'Altatás'}
                            </span>
                        </button>
                    </div>

                    {/* MENÜ */}
                    <div className="p-4 flex justify-around items-end pb-8 z-10 max-w-md mx-auto w-full">
                        <button onClick={() => setShowExpert(true)} className="flex flex-col items-center gap-1 text-xs font-bold opacity-70 hover:opacity-100 transition">
                            <div className="p-3 bg-white shadow rounded-2xl text-teal-600"><Icons.BookOpen className="w-6 h-6"/></div>
                            <span>Tudástár</span>
                        </button>
                        <button onClick={() => setShowAI(true)} className="flex flex-col items-center gap-1 text-xs font-bold opacity-70 hover:opacity-100 transition relative -top-6">
                            <div className="p-4 bg-gradient-to-tr from-indigo-500 to-purple-500 shadow-lg rounded-2xl text-white"><Icons.Sparkles className="w-7 h-7"/></div>
                            <span>AI Guru</span>
                        </button>
                        <button onClick={() => setShowHistory(true)} className="flex flex-col items-center gap-1 text-xs font-bold opacity-70 hover:opacity-100 transition">
                            <div className="p-3 bg-white shadow rounded-2xl text-slate-600"><Icons.History className="w-6 h-6"/></div>
                            <span>Napló</span>
                        </button>
                    </div>

                    {/* MODALOK */}
                    {showSettings && (
                        <div className="absolute inset-0 bg-slate-900/90 z-50 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in">
                            <div className="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6 text-slate-800">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold">Beállítások</h3>
                                    <button onClick={() => {saveSettingsToCloud(familyCode, birthDate, dayStartHour, dayEndHour); setShowSettings(false);}} className="p-2 hover:bg-slate-100 rounded-full"><Icons.X className="w-6 h-6 text-slate-400"/></button>
                                </div>
                                <div className="space-y-6">
                                    <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex justify-between items-center">
                                        <div className='overflow-hidden'>
                                            <div className="text-[10px] font-bold text-indigo-400 uppercase">Aktív Család</div>
                                            <div className="font-mono text-lg font-bold text-indigo-700 truncate">{familyCode}</div>
                                        </div>
                                        <Icons.CheckCircle className="w-6 h-6 text-indigo-500 shrink-0"/>
                                    </div>
                                    <div className="space-y-4">
                                        <div>
                                            <div className="flex justify-between text-sm font-medium text-slate-700 mb-1">
                                                <span>Nappal kezdete</span>
                                                <span className="text-orange-500 font-bold">{dayStartHour}:00</span>
                                            </div>
                                            <input type="range" min="4" max="10" step="1" value={dayStartHour} onChange={(e) => setDayStartHour(Number(e.target.value))} className="w-full accent-orange-500"/>
                                        </div>
                                        <div>
                                            <div className="flex justify-between text-sm font-medium text-slate-700 mb-1">
                                                <span>Éjszaka kezdete</span>
                                                <span className="text-indigo-500 font-bold">{dayEndHour}:00</span>
                                            </div>
                                            <input type="range" min="16" max="23" step="1" value={dayEndHour} onChange={(e) => setDayEndHour(Number(e.target.value))} className="w-full accent-indigo-500"/>
                                        </div>
                                    </div>
                                    <div className="pt-4 border-t border-slate-100 space-y-3">
                                        <button onClick={() => {saveSettingsToCloud(familyCode, birthDate, dayStartHour, dayEndHour); setShowSettings(false);}} className="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700 transition">Mentés</button>
                                        <button onClick={logout} className="w-full text-red-500 py-3 rounded-xl font-bold hover:bg-red-50 transition flex items-center justify-center gap-2"><Icons.LogOut className="w-4 h-4"/> Kijelentkezés</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showHistory && (
                        <div className="absolute inset-0 bg-slate-900/60 z-40 backdrop-blur-sm flex items-end sm:items-center justify-center" onClick={() => setShowHistory(false)}>
                            <div className="bg-white w-full sm:max-w-md h-[80%] rounded-t-3xl sm:rounded-2xl shadow-2xl flex flex-col overflow-hidden text-slate-800" onClick={e => e.stopPropagation()}>
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icons.History className="w-5 h-5"/> Előzmények</h3>
                                    <button onClick={() => setShowHistory(false)}><Icons.X className="w-5 h-5 text-slate-400"/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                                    {history.length === 0 && <div className="text-center text-slate-400 py-10">Még nincs adat.</div>}
                                    {history.slice().reverse().map((entry) => (
                                        <div key={entry.id} className="flex justify-between items-center p-4 bg-white rounded-xl border border-slate-100 shadow-sm">
                                            <div className="flex items-center gap-3">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${entry.isDaySleep ? 'bg-orange-100 text-orange-600' : 'bg-indigo-100 text-indigo-600'}`}>
                                                    {entry.isDaySleep ? <Icons.Sun className="w-5 h-5"/> : <Icons.Moon className="w-5 h-5"/>}
                                                </div>
                                                <div>
                                                    <div className="flex items-center gap-2">
                                                        <p className="font-bold text-sm text-slate-700">{new Date(entry.startTime).toLocaleDateString()}</p>
                                                        <span className="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500">{formatDuration(entry.duration)}</span>
                                                    </div>
                                                    <p className="text-xs text-slate-500 font-medium font-mono mt-0.5">{formatTime(entry.startTime)} - {formatTime(entry.endTime)}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-1">
                                                <button onClick={() => startEditing(entry)} className="p-2 text-slate-300 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition"><Icons.Edit2 className="w-4 h-4"/></button>
                                                <button onClick={() => handleDelete(entry.id)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition"><Icons.Trash2 className="w-4 h-4"/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* EDIT MODAL */}
                    {editingItem && (
                        <div className="absolute inset-0 bg-black/50 z-[60] flex items-center justify-center p-4 backdrop-blur-sm text-slate-800">
                            <div className="bg-white w-full max-w-xs p-6 rounded-2xl shadow-2xl">
                                <h3 className="font-bold text-lg mb-4">Időpont módosítása</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Kezdés</label>
                                        <input type="datetime-local" value={editStartTime} onChange={(e) => setEditStartTime(e.target.value)} className="w-full bg-slate-100 border-0 rounded-lg p-2 text-sm"/>
                                    </div>
                                    {editingItem.endTime !== null && (
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Befejezés</label>
                                            <input type="datetime-local" value={editEndTime} onChange={(e) => setEditEndTime(e.target.value)} className="w-full bg-slate-100 border-0 rounded-lg p-2 text-sm"/>
                                        </div>
                                    )}
                                </div>
                                <div className="flex gap-2 mt-6">
                                    <button onClick={() => setEditingItem(null)} className="flex-1 py-2 text-slate-500 font-bold hover:bg-slate-100 rounded-lg">Mégse</button>
                                    <button onClick={saveEdit} className="flex-1 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700">Mentés</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* AI MODAL */}
                    {showAI && (
                        <div className="absolute inset-0 bg-slate-900/60 z-40 backdrop-blur-sm flex items-end sm:items-center justify-center sm:p-4 text-slate-800">
                            <div className="bg-white w-full sm:max-w-md h-[85%] sm:h-auto rounded-t-3xl sm:rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-indigo-50">
                                    <h3 className="font-bold text-lg text-indigo-700 flex items-center gap-2"><Icons.Sparkles className="w-5 h-5" /> AI Tanácsadó</h3>
                                    <button onClick={() => setShowAI(false)}><Icons.X className="w-5 h-5 text-slate-400"/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-5 bg-slate-50 space-y-4 max-h-[60vh]">
                                    {aiLoading ? <div className="text-center"><Icons.Loader2 className="animate-spin inline w-6 h-6"/></div> : <div className="bg-white p-4 rounded-xl shadow-sm text-sm">{aiResponse || "Szia! Kérdezz bátran a baba alvásáról."}</div>}
                                </div>
                                <form onSubmit={handleAskGemini} className="p-3 bg-white border-t border-slate-100 flex gap-2">
                                    <input type="text" value={aiInput} onChange={(e) => setAiInput(e.target.value)} placeholder="Kérdezz..." className="flex-1 bg-slate-100 border-0 rounded-xl px-4 py-3 text-sm outline-none"/>
                                    <button type="submit" className="bg-indigo-600 text-white p-3 rounded-xl"><Icons.Send className="w-5 h-5" /></button>
                                </form>
                            </div>
                        </div>
                    )}
                    
                    {/* EXPERT MODAL */}
                    {showExpert && (
                        <div className="absolute inset-0 bg-slate-900/60 z-40 backdrop-blur-sm flex items-end sm:items-center justify-center sm:p-4 text-slate-800">
                            <div className="bg-white w-full sm:max-w-xl h-[90%] sm:h-[85%] rounded-t-3xl sm:rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-teal-50">
                                    <h3 className="font-bold text-lg text-teal-800 flex items-center gap-2"><Icons.BookOpen className="w-5 h-5" /> Tudástár</h3>
                                    <button onClick={() => setShowExpert(false)}><Icons.X className="w-5 h-5 text-slate-400"/></button>
                                </div>
                                <div className="p-5 overflow-y-auto bg-slate-50">
                                    {Object.entries(SLEEP_SCHEDULES).map(([key, data]) => (
                                        <div key={key} className="mb-4 p-4 rounded-xl border bg-white border-teal-200 shadow-sm">
                                            <h4 className="font-bold text-slate-800">{data.label}</h4>
                                            <p className="text-sm text-slate-600 mt-1">{data.summary}</p>
                                            <div className="mt-3 grid grid-cols-2 gap-2 text-xs">
                                                <div className="bg-orange-50 p-2 rounded text-orange-800">Nappal: <strong>{data.reqDay}</strong></div>
                                                <div className="bg-indigo-50 p-2 rounded text-indigo-800">Éjjel: <strong>{data.reqNight}</strong></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
